name: Capy Racecard — enrich entries_upcoming via hkjc-api

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Race date (YYYY-MM-DD, blank = auto from API)'
        required: false
        default: ''
      venue:
        description: 'Venue code (ST / HV, blank = auto from API)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'
  # Run every race day morning (HKT = UTC+8) after entries are seeded
  # Monday/Wednesday/Friday/Saturday at 08:30 HKT = 00:30 UTC
  schedule:
    - cron: '30 0 * * 1,3,5,6'

jobs:
  enrich-racecard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download bulk-local.db from artifact cache
        uses: actions/cache@v4
        id: db-cache
        with:
          path: bulk-local.db
          key: bulk-local-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            bulk-local-db-${{ runner.os }}-

      - name: Scrape race card from HKJC API
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date=${{ inputs.date }}"; fi
          if [ -n "${{ inputs.venue }}" ]; then ARGS="$ARGS --venue=${{ inputs.venue }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          npx tsx scripts/scrape-racecard.ts --db=bulk-local.db $ARGS
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Push enriched entries to D1
        if: inputs.dry_run != 'true'
        run: |
          SINCE=$(date -d '7 days ago' +%Y-%m-%d 2>/dev/null || date -v-7d +%Y-%m-%d)
          npx tsx scripts/push-delta.ts --db=bulk-local.db --include=entries --since=$SINCE
          bash scripts/push-to-d1.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Save bulk-local.db to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: bulk-local.db
          key: bulk-local-db-${{ runner.os }}-${{ github.run_id }}
