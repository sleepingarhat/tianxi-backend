name: Capy Results — scrape HKJC race results to D1

  on:
    workflow_dispatch:
      inputs:
        date:
          description: 'Race date (YYYY-MM-DD)'
          required: true
        venue:
          description: 'Venue code (ST / HV)'
          required: true
          default: 'ST'
        max_races:
          description: 'Max races to attempt'
          required: false
          default: '14'

  jobs:
    scrape-results:
      runs-on: ubuntu-latest
      timeout-minutes: 10
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        - name: Install dependencies
          run: npm ci

        - name: Scrape HKJC race results
          id: scrape
          run: |
            npx tsx scripts/scrape-results.ts \
              --date=${{ inputs.date }} \
              --venue=${{ inputs.venue }} \
              --max-races=${{ inputs.max_races }} \
              --out=/tmp/results.sql
            echo "--- SQL preview (first 5 lines) ---"
            head -5 /tmp/results.sql
            echo "--- Stmt count ---"
            wc -l /tmp/results.sql

        - name: Push SQL to D1
          if: hashFiles('/tmp/results.sql') != ''
          run: |
            npx wrangler d1 execute tianxi-db --remote --file=/tmp/results.sql
          env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
  