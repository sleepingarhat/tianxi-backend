name: LGB Predict Upcoming (Stage 7)

# Trains LightGBM on full history (bulk-local.db) and POSTs per-runner scores
# for upcoming races back to prod via /admin/api/lgb-predictions.
# analyze.ts reads these scores and uses lgb_score as the primary ranking
# signal when present. Cache key mirrors lgb_walkforward.yml so the DB
# rebuilt by that workflow is reused here (and vice versa).

on:
  workflow_dispatch:
    inputs:
      days_ahead:
        description: 'How many days ahead to score'
        required: false
        default: '7'
      force_rebuild_db:
        description: 'Ignore cache and rebuild bulk-local.db'
        required: false
        default: 'false'
  schedule:
    - cron: '0 20 * * *'  # 04:00 HKT — after capy_racecard daily sync

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: tianxi-backend

      - name: Checkout data (public repo, sparse)
        uses: actions/checkout@v4
        with:
          repository: sleepingarhat/tianxi-database
          path: hkjc-data
          sparse-checkout: |
            data
            horses/form_records
            horses/profiles
            last_sync.json
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tianxi-backend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: tianxi-backend
        run: npm ci

      - name: Install python deps
        run: pip install --quiet lightgbm pandas numpy scikit-learn scipy

      - name: Compute data signature (cache key — must match lgb_walkforward.yml)
        id: sig
        run: |
          DATA_SHA=$(cd hkjc-data && git rev-parse HEAD)
          SCRIPTS_HASH=$(find tianxi-backend/scripts/ingest tianxi-backend/scripts/elo tianxi-backend/scripts/import-csv.ts tianxi-backend/src/db/schema.sql -type f 2>/dev/null | sort | xargs sha256sum | sha256sum | head -c12)
          KEY="lgb-db-${DATA_SHA:0:12}-${SCRIPTS_HASH}"
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $KEY"

      - name: Restore bulk-local.db cache
        id: db-cache
        if: inputs.force_rebuild_db != 'true'
        uses: actions/cache/restore@v4
        with:
          path: tianxi-backend/bulk-local.db
          key: ${{ steps.sig.outputs.key }}

      - name: Build bulk-local.db (import results CSVs)
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: tianxi-backend
        run: |
          npx tsx scripts/import-csv.ts --data-dir ../hkjc-data/data --db ./bulk-local.db
          ls -lh bulk-local.db

      - name: Ingest horse form records
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: tianxi-backend
        run: |
          npx tsx scripts/ingest/index.ts form --data-dir=../hkjc-data --db=./bulk-local.db
          ls -lh bulk-local.db

      - name: Ingest horse pedigree (sire/dam -> horse_pedigree for LGB feature 4)
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: tianxi-backend
        run: |
          npx tsx scripts/ingest/index.ts pedigree --data-dir=../hkjc-data --db=./bulk-local.db
          ls -lh bulk-local.db

      - name: Compute ELO ratings
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: tianxi-backend
        run: |
          npx tsx scripts/elo/compute.ts --db=./bulk-local.db --reset
          ls -lh bulk-local.db

      - name: Save bulk-local.db cache
        if: always() && steps.db-cache.outputs.cache-hit != 'true' && hashFiles('tianxi-backend/bulk-local.db') != ''
        uses: actions/cache/save@v4
        with:
          path: tianxi-backend/bulk-local.db
          key: ${{ steps.sig.outputs.key }}

      - name: DB sanity counts
        working-directory: tianxi-backend
        run: |
          sudo apt-get -qq install -y sqlite3 >/dev/null 2>&1 || true
          sqlite3 bulk-local.db "SELECT 'meetings:' || COUNT(*) FROM race_meetings;
            SELECT 'races:' || COUNT(*) FROM races;
            SELECT 'results:' || COUNT(*) FROM race_results;
            SELECT 'form_records:' || COUNT(*) FROM horse_form_records;"
          # pedigree guard: a sparse-checkout miss would silently null every
          # sire/damsire feature (see memory tx-sparse-checkout-ci). Fail loud
          # on a fresh (non-cached) build so train/serve never skews.
          PED=$(sqlite3 bulk-local.db "SELECT COUNT(*) FROM horse_pedigree;" 2>/dev/null || echo 0)
          echo "horse_pedigree rows: $PED"
          if [ "${{ steps.db-cache.outputs.cache-hit }}" != 'true' ] && [ "${PED:-0}" -lt 1000 ]; then
            echo "FATAL: horse_pedigree has $PED rows (<1000) — pedigree ingest/sparse-checkout broken"; exit 1
          fi

      - name: Dump training features (full history)
        working-directory: tianxi-backend
        run: |
          YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)
          npx tsx scripts/backtest/dump-features.ts \
            --db=bulk-local.db \
            --from=2016-09-01 --to=$YESTERDAY \
            --out=features.csv
          echo "training rows: $(wc -l < features.csv)"

      - name: Fetch upcoming entries from prod
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          DAYS_AHEAD: ${{ inputs.days_ahead || '7' }}
        working-directory: tianxi-backend
        run: |
          FROM=$(date -u +%Y-%m-%d)
          TO=$(date -u -d "+${DAYS_AHEAD} day" +%Y-%m-%d)
          echo "Fetching entries $FROM .. $TO"
          curl -fsSL "https://tianxi.racing/admin/api/entries-upcoming-export?from=$FROM&to=$TO&token=$ADMIN_TOKEN" \
            -o upcoming-entries.json
          echo "Entry count: $(jq '.count' upcoming-entries.json)"
          jq '.entries[0]' upcoming-entries.json || true

      - name: Dump features for upcoming entries
        working-directory: tianxi-backend
        run: |
          npx tsx scripts/backtest/dump-features.ts \
            --db=bulk-local.db \
            --upcoming-json=upcoming-entries.json \
            --out=upcoming-features.csv
          echo "upcoming feature rows: $(wc -l < upcoming-features.csv)"
          head -2 upcoming-features.csv | cut -c1-200

      - name: Train LGB + predict + upload to prod
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        working-directory: tianxi-backend
        run: |
          MODEL_VER="lgb-ensemble-$(date -u +%Y%m%d)"
          python scripts/backtest/predict_upcoming.py \
            --train=features.csv \
            --upcoming=upcoming-features.csv \
            --admin-url=https://tianxi.racing/admin/api/lgb-predictions \
            --token="$ADMIN_TOKEN" \
            --model-version="$MODEL_VER" \
            --auto-alpha \
            --alpha-pass=0.88

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lgb-predict-upcoming
          path: |
            tianxi-backend/upcoming-entries.json
            tianxi-backend/upcoming-features.csv
            tianxi-backend/features.csv
          if-no-files-found: warn
          retention-days: 14
