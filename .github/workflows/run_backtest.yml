name: Run backtest report

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Diff diagnostic
        env:
          BASE: "https://tianxi-backend.tianxi-entertainment.workers.dev"
        run: |
          set +e
          mkdir -p reports
          OUT="reports/latest-backtest.md"
          : > "$OUT"
          echo "# Backtest DIFF diagnostic @ $(date -u +%FT%TZ)" >> "$OUT"
          echo "" >> "$OUT"
          echo "## /backtest-diff" >> "$OUT"
          echo "\`\`\`json" >> "$OUT"
          curl -sS --max-time 60 "$BASE/api/analyze/backtest-diff" | python3 -m json.tool >> "$OUT" 2>&1
          echo "\`\`\`" >> "$OUT"
          echo "" >> "$OUT"
          echo "## /backtest-report (full)" >> "$OUT"
          curl -sS --max-time 120 "$BASE/api/analyze/backtest-report" >> "$OUT" 2>&1
          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest-backtest.md
          git commit -m "diag: backtest diff" || echo "no changes"
          git push
