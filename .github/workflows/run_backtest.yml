name: Run backtest report

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Trigger + fetch backtest report
        run: |
          set +e
          mkdir -p reports
          OUT="reports/latest-backtest.md"
          : > "$OUT"
          echo "# Backtest report run @ $(date -u +%FT%TZ)" >> "$OUT"
          echo "" >> "$OUT"
          for attempt in 1 2 3 4 5 6; do
            echo "--- Attempt $attempt ---" >> "$OUT"
            HTTP=$(curl -sS -o body.txt -w "%{http_code}" --max-time 180 https://api.tianxi.racing/api/analyze/backtest-report)
            CURL_RC=$?
            BYTES=$(wc -c < body.txt 2>/dev/null || echo 0)
            echo "HTTP=$HTTP curl_rc=$CURL_RC bytes=$BYTES" >> "$OUT"
            if [ "$HTTP" = "200" ] && [ "$BYTES" -gt 100 ]; then
              echo "" >> "$OUT"
              echo "## Report body" >> "$OUT"
              cat body.txt >> "$OUT"
              break
            fi
            echo "Body preview:" >> "$OUT"
            head -c 500 body.txt >> "$OUT"
            echo "" >> "$OUT"
            sleep 30
          done
          echo "" >> "$OUT"
          echo "## /backtest-status" >> "$OUT"
          curl -sS --max-time 30 https://api.tianxi.racing/api/analyze/backtest-status >> "$OUT" 2>&1 || true
          echo "" >> "$OUT"
          echo "" >> "$OUT"
          echo "## /prediction-accuracy" >> "$OUT"
          curl -sS --max-time 30 https://api.tianxi.racing/api/analyze/prediction-accuracy >> "$OUT" 2>&1 || true
          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest-backtest.md
          git commit -m "report: backtest snapshot" || echo "no changes"
          git push
