name: Run backtest report

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Discover URL + fetch report
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: "653a13852ac331972d14432741113f6f"
        run: |
          set +e
          mkdir -p reports
          OUT="reports/latest-backtest.md"
          : > "$OUT"
          echo "# Backtest report run @ $(date -u +%FT%TZ)" >> "$OUT"
          echo "" >> "$OUT"

          # 1. Get account subdomain via CF API
          SUB_RESP=$(curl -sS --max-time 30 -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/subdomain")
          echo "## Subdomain API resp" >> "$OUT"
          echo "$SUB_RESP" >> "$OUT"
          SUB=$(echo "$SUB_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get(\"result\",{}).get(\"subdomain\",\"\"))")
          echo "" >> "$OUT"
          echo "Detected subdomain: [$SUB]" >> "$OUT"

          # 2. List candidate URLs
          URLS=()
          if [ -n "$SUB" ]; then
            URLS+=("https://tianxi-backend.$SUB.workers.dev")
          fi
          URLS+=("https://api.tianxi.racing")

          # 3. List CF Workers domain routes too
          echo "" >> "$OUT"
          echo "## Worker custom domains" >> "$OUT"
          curl -sS --max-time 30 -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/domains" >> "$OUT"
          echo "" >> "$OUT"

          # 4. Try each URL for healthz then report
          BASE=""
          for u in "${URLS[@]}"; do
            echo "" >> "$OUT"
            echo "## Trying base: $u" >> "$OUT"
            HTTP=$(curl -sS -o pa.txt -w "%{http_code}" --max-time 30 "$u/api/analyze/prediction-accuracy")
            echo "/prediction-accuracy HTTP=$HTTP" >> "$OUT"
            head -c 300 pa.txt >> "$OUT"; echo "" >> "$OUT"
            if [ "$HTTP" = "200" ]; then BASE="$u"; break; fi
          done

          if [ -z "$BASE" ]; then
            echo "" >> "$OUT"
            echo "## ✘ No reachable base URL — aborting" >> "$OUT"
            cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "" >> "$OUT"
          echo "## Using BASE=$BASE" >> "$OUT"

          # 5. Fetch report (auto-runs backtest first call)
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "" >> "$OUT"
            echo "--- /backtest-report attempt $attempt ---" >> "$OUT"
            HTTP=$(curl -sS -o body.txt -w "%{http_code}" --max-time 180 "$BASE/api/analyze/backtest-report")
            BYTES=$(wc -c < body.txt 2>/dev/null || echo 0)
            echo "HTTP=$HTTP bytes=$BYTES" >> "$OUT"
            if [ "$HTTP" = "200" ] && [ "$BYTES" -gt 200 ]; then
              echo "" >> "$OUT"
              echo "## Report body" >> "$OUT"
              cat body.txt >> "$OUT"
              break
            fi
            echo "Body preview:" >> "$OUT"
            head -c 800 body.txt >> "$OUT"; echo "" >> "$OUT"
            sleep 30
          done

          echo "" >> "$OUT"
          echo "## /backtest-status" >> "$OUT"
          curl -sS --max-time 30 "$BASE/api/analyze/backtest-status" >> "$OUT" 2>&1 || true

          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest-backtest.md
          git commit -m "report: backtest snapshot" || echo "no changes"
          git push
