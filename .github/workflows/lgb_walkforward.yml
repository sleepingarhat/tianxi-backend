name: LGB Walkforward Backtest (Stage 3)

# Builds bulk-local.db from scratch using public tianxi-database CSVs,
# computes ELO, dumps features, and runs LightGBM walk-forward backtest.
#
# The constructed DB is cached by (data-repo HEAD SHA) so subsequent runs
# (with the same data) skip straight to feature dump + LGB (~3 min).

on:
  workflow_dispatch:
    inputs:
      from:
        description: 'Eval window start (YYYY-MM-DD)'
        required: false
        default: '2024-09-01'
      to:
        description: 'Eval window end (YYYY-MM-DD)'
        required: false
        default: '2026-04-30'
      min_train_races:
        description: 'Warmup races before eval starts'
        required: false
        default: '200'
      retrain_every:
        description: 'Retrain LGB every N races'
        required: false
        default: '50'
      n_estimators:
        description: 'LGB num_boost_round'
        required: false
        default: '200'
      num_leaves:
        description: 'LGB num_leaves'
        required: false
        default: '15'
      objective:
        description: 'LGB objective (lambdarank or binary)'
        required: false
        default: 'lambdarank'
      force_rebuild_db:
        description: 'Ignore cache and rebuild bulk-local.db from scratch'
        required: false
        default: 'false'

jobs:
  walkforward:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: tianxi-backend

      - name: Checkout data (public repo, sparse — only dirs we need)
        uses: actions/checkout@v4
        with:
          repository: sleepingarhat/tianxi-database
          path: hkjc-data
          sparse-checkout: |
            data
            horses/form_records
            last_sync.json
          sparse-checkout-cone-mode: false

      - name: Show data repo HEAD + sizes
        run: |
          echo "data repo HEAD: $(cd hkjc-data && git rev-parse --short HEAD)"
          du -sh hkjc-data/data hkjc-data/horses/form_records 2>/dev/null || true
          echo "data CSV count: $(find hkjc-data/data -name '*.csv' | wc -l)"
          echo "form record count: $(find hkjc-data/horses/form_records -name '*.csv' | wc -l)"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tianxi-backend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: tianxi-backend
        run: npm ci

      - name: Install Python deps
        run: pip install --quiet lightgbm pandas numpy

      - name: Compute data signature (for cache key)
        id: sig
        run: |
          DATA_SHA=$(cd hkjc-data && git rev-parse HEAD)
          # Hash backend ingest+ELO scripts so any code change invalidates cache
          SCRIPTS_HASH=$(find tianxi-backend/scripts/ingest tianxi-backend/scripts/elo tianxi-backend/scripts/import-csv.ts tianxi-backend/src/db/schema.sql -type f 2>/dev/null | sort | xargs sha256sum | sha256sum | head -c12)
          KEY="lgb-db-${DATA_SHA:0:12}-${SCRIPTS_HASH}"
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $KEY"

      - name: Restore bulk-local.db cache
        id: db-cache
        if: inputs.force_rebuild_db != 'true'
        uses: actions/cache/restore@v4
        with:
          path: tianxi-backend/bulk-local.db
          key: ${{ steps.sig.outputs.key }}

      - name: Build bulk-local.db (import results CSVs)
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: tianxi-backend
        run: |
          echo '=== STEP 1/3: import-csv.ts (results, dividends, sectionals, commentary, videos) ==='
          npx tsx scripts/import-csv.ts --data-dir ../hkjc-data/data --db ./bulk-local.db
          ls -lh bulk-local.db

      - name: Ingest horse form records
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: tianxi-backend
        run: |
          echo '=== STEP 2/3: ingest/index.ts form (horse_form_records for ELO) ==='
          npx tsx scripts/ingest/index.ts form --data-dir=../hkjc-data --db=./bulk-local.db
          ls -lh bulk-local.db

      - name: Compute ELO ratings
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: tianxi-backend
        run: |
          echo '=== STEP 3/3: elo/compute.ts ==='
          npx tsx scripts/elo/compute.ts --db=./bulk-local.db --reset
          ls -lh bulk-local.db

      - name: Save bulk-local.db cache
        if: always() && steps.db-cache.outputs.cache-hit != 'true' && hashFiles('tianxi-backend/bulk-local.db') != ''
        uses: actions/cache/save@v4
        with:
          path: tianxi-backend/bulk-local.db
          key: ${{ steps.sig.outputs.key }}

      - name: DB sanity counts
        working-directory: tianxi-backend
        run: |
          sudo apt-get -qq install -y sqlite3 >/dev/null 2>&1 || true
          sqlite3 bulk-local.db "SELECT 'meetings:' || COUNT(*) FROM race_meetings; SELECT 'races:' || COUNT(*) FROM races; SELECT 'results:' || COUNT(*) FROM race_results; SELECT 'horse_form_records:' || COUNT(*) FROM horse_form_records;"
          # ELO table name may vary across schema versions — try both
          sqlite3 bulk-local.db "SELECT name FROM sqlite_master WHERE type='table' AND name LIKE '%elo%';"


      - name: Dump features
        working-directory: tianxi-backend
        run: |
          npx tsx scripts/backtest/dump-features.ts \
            --db=bulk-local.db \
            --from='${{ inputs.from }}' \
            --to='${{ inputs.to }}' \
            --out=features.csv
          echo "feature rows (incl header): $(wc -l < features.csv)"
          head -2 features.csv
          echo "dividend rows (incl header): $(wc -l < features.dividends.csv)"
          head -3 features.dividends.csv

      - name: Walk-forward LGB
        working-directory: tianxi-backend
        run: |
          python scripts/backtest/lgb_walkforward.py \
            --features features.csv \
            --dividends features.dividends.csv \
            --out results.json \
            --min-train-races ${{ inputs.min_train_races }} \
            --retrain-every-races ${{ inputs.retrain_every }} \
            --n-estimators ${{ inputs.n_estimators }} \
            --num-leaves ${{ inputs.num_leaves }} \
            --objective ${{ inputs.objective }} \
            --verbose 2>&1 | tee lgb_stdout.txt

      - name: Print summary block
        if: always()
        working-directory: tianxi-backend
        run: |
          if [ -f results.json ]; then
            echo '======== SUMMARY ========'
            python -c "import json; r=json.load(open('results.json')); print(json.dumps(r['summary'], indent=2, ensure_ascii=False))"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lgb-walkforward-results
          path: |
            tianxi-backend/results.json
            tianxi-backend/features.csv
            tianxi-backend/features.dividends.csv
            tianxi-backend/lgb_stdout.txt
          retention-days: 14
