account_id = "653a13852ac331972d14432741113f6f"
name = "tianxi-backend"
main = "src/index.ts"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]
usage_model = "unbound"

[vars]
ENVIRONMENT = "production"
AI_API_URL = "https://api.x.ai/v1/chat/completions"
AI_MODEL = "grok-4.20-reasoning"
# TIMESFM_API_URL set later when RunPod endpoint ready

# Cloudflare D1 Database
[[d1_databases]]
binding = "DB"
database_name = "tianxi-db"
database_id = "aad1636e-869a-43f5-aa95-4a19e3aa5517"

# KV for caching odds and sessions
# [[kv_namespaces]]
# binding = "CACHE"
# id = "placeholder"

  [triggers]
  crons = [
    "0 19 * * *",  # 03:00 HKT daily — refresh past-meeting hit-rate cache
    "0 22 * * *",  # 06:00 HKT daily — pre-build race-day report (post-trackwork sync)
    "0 3 * * *",   # 11:00 HKT daily — refresh report ~1.5h before ST first race
    "0 4 * * *",   # 12:00 HKT daily — second pre-race refresh
    "0 10 * * *",  # 18:00 HKT daily — refresh report 1h before HV first race
  ]
  